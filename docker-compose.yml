version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: fleet_db
    restart: always
    environment:
      MYSQL_DATABASE: fleet_db
      MYSQL_ROOT_PASSWORD: hbogogo1145
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: fleet-backend
    restart: on-failure
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: mysql://root:hbogogo1145@db:3306/fleet_db
      ACCESS_SECRET: my_super_secret_access_key
      REFRESH_SECRET: my_super_secret_refresh_key
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: fleet-frontend
    restart: always
    ports:
      - "3000:3000"
    stdin_open: true # Keeps the React terminal alive
    tty: true
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: fleet_pma
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: hbogogo1145
    depends_on:
      - db

volumes:
  db_data:
